<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copro — Search Quotation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #dc2626 100%);
            min-height: 100vh;
            padding: 30px 20px;
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            max-width: 820px;
            margin-left: auto;
            margin-right: auto;
        }

        .back-btn {
            background: rgba(255,255,255,0.15);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            text-decoration: none;
            white-space: nowrap;
            transition: background 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.25); }

        .top-title {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }

        /* Search box */
        .search-card {
            background: white;
            border-radius: 14px;
            padding: 28px;
            max-width: 820px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }

        .search-label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        .search-row {
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            outline: none;
            border-color: #1e3a5f;
        }

        .search-btn {
            padding: 12px 28px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-btn:hover { background: #152a45; }

        .search-hint {
            font-size: 11px;
            color: #999;
            margin-top: 8px;
        }

        /* Results */
        #resultsArea { max-width: 820px; margin: 0 auto; }

        .no-result {
            background: white;
            border-radius: 14px;
            padding: 48px 28px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
        }
        .no-result .icon { font-size: 48px; margin-bottom: 12px; }
        .no-result h3 { color: #333; font-size: 18px; margin-bottom: 6px; }
        .no-result p  { color: #999; font-size: 13px; }

        .result-count {
            color: rgba(255,255,255,0.85);
            font-size: 13px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Quotation card */
        .qt-card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .qt-card-header {
            background: #1e3a5f;
            color: white;
            padding: 16px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .qt-number {
            font-size: 18px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }

        .qt-date {
            font-size: 13px;
            color: #93c5fd;
        }

        .qt-card-body { padding: 20px 22px; }

        .qt-meta-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin-bottom: 18px;
            font-size: 13px;
        }

        .qt-meta-item { display: flex; flex-direction: column; gap: 2px; }
        .qt-meta-label { font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; }
        .qt-meta-value { color: #222; font-weight: 500; }

        /* Items table */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .items-table th {
            background: #1e3a5f;
            color: white;
            padding: 8px 10px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
        }
        .items-table th:nth-child(n+3) { background: #dc2626; }
        .items-table th.right, .items-table td.right { text-align: right; }

        .items-table td {
            padding: 8px 10px;
            border-bottom: 1px solid #eee;
            color: #333;
        }
        .items-table tr:last-child td { border-bottom: none; }
        .items-table tr:nth-child(even) td { background: #f9f9f9; }

        .qt-total {
            text-align: right;
            border-top: 2px solid #dc2626;
            padding-top: 10px;
        }
        .qt-total .total-line {
            font-size: 15px;
            font-weight: 700;
            color: #1e3a5f;
        }

        .qt-footer-note {
            font-size: 11px;
            color: #aaa;
            text-align: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a class="back-btn" href="index.html">← Dashboard</a>
        <div class="top-title">🔍 Search Quotation</div>
    </div>

    <div class="search-card">
        <label class="search-label">Search by Customer Name or Quotation Number</label>
        <div class="search-row">
            <input class="search-input" id="searchInput" type="text"
                   placeholder="e.g.  COPRO ASIA  or  QT290626SB"
                   onkeydown="if(event.key==='Enter') doSearch()">
            <button class="search-btn" onclick="doSearch()">Search</button>
        </div>
        <div class="search-hint">Partial customer name works. Quotation number must match exactly.</div>
    </div>

    <div id="resultsArea"></div>

<script>
// ─── Scan all localStorage for quotation records ──────────────────────────────
function getAllRecords() {
    const all = [];
    const pattern = /^copro_quotations_(\d{4})_(\d{1,2})$/;
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (pattern.test(key)) {
            try {
                const recs = JSON.parse(localStorage.getItem(key) || '[]');
                recs.forEach(r => all.push(r));
            } catch(e) {}
        }
    }
    return all;
}

// ─── Search ───────────────────────────────────────────────────────────────────
function doSearch() {
    const raw   = document.getElementById('searchInput').value.trim();
    const query = raw.toUpperCase();
    const area  = document.getElementById('resultsArea');

    if (!query) {
        area.innerHTML = '';
        return;
    }

    const all = getAllRecords();

    const matches = all.filter(r => {
        const nameMatch = (r.customerName || '').toUpperCase().includes(query);
        const qtMatch   = (r.qtNumber    || '').toUpperCase() === query ||
                          (r.qtNumber    || '').toUpperCase().includes(query);
        return nameMatch || qtMatch;
    });

    if (matches.length === 0) {
        area.innerHTML = `
            <div class="no-result">
                <div class="icon">📭</div>
                <h3>No Quotation In Record</h3>
                <p>No results found for "<strong>${escHtml(raw)}</strong>". Check the spelling or try a different search.</p>
            </div>`;
        return;
    }

    // Sort newest first (by date string DD-MM-YYYY)
    matches.sort((a, b) => {
        const da = parseDate(a.date);
        const db = parseDate(b.date);
        return db - da;
    });

    area.innerHTML = `<div class="result-count">${matches.length} quotation${matches.length > 1 ? 's' : ''} found</div>` +
        matches.map(r => renderCard(r)).join('');
}

// ─── Parse DD-MM-YYYY ─────────────────────────────────────────────────────────
function parseDate(str) {
    if (!str) return 0;
    const parts = str.split('-');
    if (parts.length !== 3) return 0;
    return new Date(`${parts[2]}-${parts[1]}-${parts[0]}`).getTime() || 0;
}

// ─── Render one quotation card ────────────────────────────────────────────────
function renderCard(r) {
    const cur      = r.currency || 'RM';
    const total    = (r.totalValue || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    const items    = Array.isArray(r.items) ? r.items : [];
    const hasItems = items.length > 0 && items.some(i => i.description);

    const itemRows = hasItems ? items.filter(i => i.description).map((item, idx) => {
        const amount = ((item.qty || 0) * (item.price || 0))
            .toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        const unitPrice = (item.price || 0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        return `<tr>
            <td>${idx + 1}</td>
            <td>${escHtml(item.description || '')}</td>
            <td class="right">${item.qty || ''}</td>
            <td>${escHtml(item.uom || '')}</td>
            <td class="right">${unitPrice}</td>
            <td class="right">${amount}</td>
        </tr>`;
    }).join('') : `<tr><td colspan="6" style="text-align:center;color:#aaa;font-style:italic;">No item detail stored</td></tr>`;

    const preparedBy = r.preparedBy
        ? `<span style="font-weight:600;color:#1e3a5f;">${escHtml(r.preparedBy)}</span>${r.preparedByContact ? `&nbsp; Tel: <strong>${escHtml(r.preparedByContact)}</strong>` : ''}`
        : '';

    return `
    <div class="qt-card">
        <div class="qt-card-header">
            <div>
                <div class="qt-number">${escHtml(r.qtNumber || '—')}</div>
                <div class="qt-date">${escHtml(r.date || '')}</div>
            </div>
            <div style="text-align:right;font-size:13px;">
                <div style="color:#93c5fd;font-size:11px;">TOTAL</div>
                <div style="font-size:20px;font-weight:700;">${cur} ${total}</div>
            </div>
        </div>
        <div class="qt-card-body">

            <div class="qt-meta-grid">
                <div class="qt-meta-item">
                    <span class="qt-meta-label">Customer</span>
                    <span class="qt-meta-value">${escHtml(r.customerName || '—')}</span>
                </div>
                <div class="qt-meta-item">
                    <span class="qt-meta-label">Contact Person</span>
                    <span class="qt-meta-value">${escHtml(r.contactPerson || r.contact || '—')}</span>
                </div>
                <div class="qt-meta-item">
                    <span class="qt-meta-label">Phone</span>
                    <span class="qt-meta-value">${escHtml(r.phone || '—')}</span>
                </div>
                <div class="qt-meta-item">
                    <span class="qt-meta-label">Payment Terms</span>
                    <span class="qt-meta-value">${escHtml(r.paymentTerms || '—')}</span>
                </div>
                ${r.poReference ? `<div class="qt-meta-item"><span class="qt-meta-label">PO Reference</span><span class="qt-meta-value">${escHtml(r.poReference)}</span></div>` : ''}
                <div class="qt-meta-item">
                    <span class="qt-meta-label">Valid For</span>
                    <span class="qt-meta-value">${escHtml(r.validity || '—')}</span>
                </div>
            </div>

            ${r.customerAddress ? `<div style="font-size:12px;color:#666;background:#f9f9f9;padding:8px 10px;border-radius:6px;margin-bottom:16px;line-height:1.5;">${escHtml(r.customerAddress).replace(/\n/g,'<br>')}</div>` : ''}

            <table class="items-table">
                <thead>
                    <tr>
                        <th style="width:4%">No</th>
                        <th>Description</th>
                        <th class="right" style="width:8%">Qty</th>
                        <th style="width:8%">UOM</th>
                        <th class="right" style="width:13%">Price/${cur}</th>
                        <th class="right" style="width:13%">Amount</th>
                    </tr>
                </thead>
                <tbody>${itemRows}</tbody>
            </table>

            <div class="qt-total">
                <div class="total-line">Total Amount: ${cur} ${total}</div>
            </div>

            ${preparedBy ? `<div style="font-size:12px;color:#555;margin-top:14px;padding-top:10px;border-top:1px solid #eee;">Quotation Prepared By: ${preparedBy}</div>` : ''}

            <div class="qt-footer-note">THIS IS A RETRIEVED RECORD FROM LOCAL STORAGE — FOR REFERENCE ONLY</div>
        </div>
    </div>`;
}

// ─── Escape HTML ──────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
